<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Online Tools - QR Code & Password Generator</title>
    <!-- QRCode.js Library from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-container {
            width: 100%;
            max-width: 450px;
        }
        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        h1 { margin-bottom: 5px; font-size: 22px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #fff;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        button {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #0369a1; }
        .result-box {
            margin-top: 20px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #475569;
            display: none;
        }
        #qrcode {
            display: inline-block;
            margin-top: 10px;
            background: #fff;
            padding: 10px;
            border-radius: 6px;
        }
        .pass-output {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .pass-output input {
            margin-bottom: 0;
            background: #0f172a;
            color: #38bdf8;
            font-weight: bold;
            text-align: center;
        }
        .copy-btn {
            background-color: #10b981;
            width: auto;
            padding: 0 15px;
        }
        .copy-btn:hover { background-color: #059669; }

        /* Ad Banner Styling */
        .ad-banner {
            background: #1e293b;
            border: 2px dashed #334155;
            color: #64748b;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        
        <!-- Top Ad Banner Space (Yahan AdSense ka code lagayein) -->
        <div class="ad-banner">
            Advertisement Space (Top Banner)
        </div>

        <!-- Tool 1: QR Code Generator -->
        <div class="card">
            <h1>QR Code Generator</h1>
            <p>Generate high-quality QR codes instantly.</p>
            <input type="text" id="qrText" placeholder="Enter URL or text...">
            <button onclick="generateQR()">Generate QR Code</button>

            <div class="result-box" id="qrResultBox">
                <div id="qrcode"></div>
            </div>
        </div>

        <!-- Tool 2: Password Generator -->
        <div class="card">
            <h1>Secure Password Generator</h1>
            <p>Create strong, uncrackable passwords instantly.</p>
            <button onclick="generatePassword()">Generate Password</button>

            <div class="result-box" id="passResultBox" style="display:block;">
                <div class="pass-output">
                    <input type="text" id="passText" readonly value="Click button above">
                    <button class="copy-btn" onclick="copyPassword()">Copy</button>
                </div>
            </div>
        </div>

        <!-- Bottom Ad Banner Space (Yahan bhi ad code aa sakta hai) -->
        <div class="ad-banner">
            Advertisement Space (Bottom Banner)
        </div>

    </div>

    <script>
        // QR Code Logic
        function generateQR() {
            let text = document.getElementById("qrText").value.trim();
            let qrContainer = document.getElementById("qrcode");
            let resultBox = document.getElementById("qrResultBox");

            if (text === "") {
                alert("Please enter some text or URL!");
                return;
            }

            qrContainer.innerHTML = "";
            new QRCode(qrContainer, {
                text: text,
                width: 160,
                height: 160,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            resultBox.style.display = "block";
        }

        // Password Generator Logic
        function generatePassword() {
            let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*!";
            let passLength = 14;
            let password = "";
            
            for (let i = 0; i < passLength; i++) {
                let randomIndex = Math.floor(Math.random() * chars.length);
                password += chars[randomIndex];
            }

            document.getElementById("passText").value = password;
        }

        // Robust Copy Password Function
        function copyPassword() {
            let passInput = document.getElementById("passText");
            
            if (passInput.value === "Click button above" || passInput.value === "") {
                alert("Please generate a password first!");
                return;
            }

            passInput.select();
            passInput.setSelectionRange(0, 99999);

            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(passInput.value).then(() => {
                        alert("Password copied successfully!");
                    }).catch(err => {
                        fallbackCopy(passInput);
                    });
                } else {
                    fallbackCopy(passInput);
                }
            } catch (err) {
                fallbackCopy(passInput);
            }
        }

        function fallbackCopy(inputElement) {
            try {
                inputElement.select();
                var successful = document.execCommand('copy');
                if (successful) {
                    alert("Password copied successfully!");
                } else {
                    alert("Failed to copy. Please copy manually.");
                }
            } catch (err) {
                alert("Browser does not support automatic copying. Please copy manually.");
            }
        }
    </script>
</body>
</html>
